name: Build and Deploy Smart Home Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/smart-home-backend-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/"

      - name: Deploy and Restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "=== Deploying Smart Home Backend ==="

            echo "Copying latest JAR..."
            cp /home/ubuntu/target/smart-home-backend-0.0.1-SNAPSHOT.jar \
               /home/ubuntu/smart-home-backend-0.0.1-SNAPSHOT.jar

            echo "Verifying deployed JAR..."
            ls -lh /home/ubuntu/smart-home-backend-0.0.1-SNAPSHOT.jar

            echo "Restarting service..."
            sudo systemctl restart smart-home

            echo "Waiting for application to start..."
            sleep 15

            echo "Checking service status..."
            sudo systemctl is-active smart-home

            echo "Recent logs:"
            sudo journalctl -u smart-home -n 30 --no-pager

            echo "Deployment completed successfully."
